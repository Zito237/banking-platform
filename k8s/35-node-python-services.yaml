# --- Audit Service — NestJS (9003) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-service
  namespace: finpay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: audit-service
  template:
    metadata:
      labels:
        app: audit-service
    spec:
      containers:
        - name: audit-service
          image: finpay/audit-service:latest
          ports:
            - containerPort: 9003
          env:
            - name: PORT
              value: "9003"
            - name: RABBITMQ_URL
              value: amqp://guest:guest@rabbitmq:5672
            - name: RABBITMQ_EXCHANGE
              value: banking.events
            - name: DATA_DIR
              value: /data/audit
          volumeMounts:
            - name: audit-data
              mountPath: /data/audit
          readinessProbe:
            httpGet: { path: /health, port: 9003 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 9003 }
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests: { memory: "128Mi", cpu: "100m" }
            limits:   { memory: "256Mi", cpu: "300m" }
      volumes:
        - name: audit-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: audit-service
  namespace: finpay
spec:
  selector:
    app: audit-service
  ports:
    - port: 9003

