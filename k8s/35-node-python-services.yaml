# --- Reporting Service — Python FastAPI (9004) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reporting-service
  namespace: finpay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reporting-service
  template:
    metadata:
      labels:
        app: reporting-service
    spec:
      containers:
        - name: reporting-service
          image: finpay/reporting-service:latest
          ports:
            - containerPort: 9004
          env:
            - name: RABBITMQ_HOST
              value: rabbitmq
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_USER
              value: guest
            - name: RABBITMQ_PASS
              value: guest
            - name: RABBITMQ_EXCHANGE
              value: banking.events
            - name: DATABASE_PATH
              value: /data/reporting.db
          volumeMounts:
            - name: reporting-data
              mountPath: /data
          readinessProbe:
            httpGet: { path: /api/health, port: 9004 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /api/health, port: 9004 }
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests: { memory: "128Mi", cpu: "100m" }
            limits:   { memory: "256Mi", cpu: "300m" }
      volumes:
        - name: reporting-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: reporting-service
  namespace: finpay
spec:
  selector:
    app: reporting-service
  ports:
    - port: 9004

