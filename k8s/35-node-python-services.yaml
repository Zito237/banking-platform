# =============================================================================
# Services Node.js (NestJS) et Python (FastAPI)
# =============================================================================

# --- Notification Service — NestJS (9002) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: finpay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: finpay/notification-service:latest
          ports:
            - containerPort: 9002
          env:
            - name: PORT
              value: "9002"
            - name: RABBITMQ_URL
              value: amqp://guest:guest@rabbitmq:5672
            - name: RABBITMQ_EXCHANGE
              value: banking.events
          readinessProbe:
            httpGet: { path: /health, port: 9002 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 9002 }
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests: { memory: "128Mi", cpu: "100m" }
            limits:   { memory: "256Mi", cpu: "300m" }
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: finpay
spec:
  selector:
    app: notification-service
  ports:
    - port: 9002

