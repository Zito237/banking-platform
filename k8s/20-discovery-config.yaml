# =============================================================================
# Discovery Server (Eureka) et Config Server
# =============================================================================

# --- Discovery Server ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: discovery-server
  namespace: finpay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: discovery-server
  template:
    metadata:
      labels:
        app: discovery-server
    spec:
      containers:
        - name: discovery-server
          image: finpay/discovery-server:latest
          ports:
            - containerPort: 8761
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: discovery-server
  namespace: finpay
spec:
  selector:
    app: discovery-server
  ports:
    - port: 8761

---
# --- Config Server ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-server
  namespace: finpay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-server
  template:
    metadata:
      labels:
        app: config-server
    spec:
      containers:
        - name: config-server
          image: finpay/config-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8888
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: native
            - name: SPRING_CLOUD_CONFIG_SERVER_NATIVE_SEARCH_LOCATIONS
              value: file:///config-repo
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://discovery-server:8761/eureka/
          volumeMounts:
            - name: config-repo
              mountPath: /config-repo
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8888
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8888
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: config-repo
          configMap:
            name: config-repo-files

---
apiVersion: v1
kind: Service
metadata:
  name: config-server
  namespace: finpay
spec:
  selector:
    app: config-server
  ports:
    - port: 8888
