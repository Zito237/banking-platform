# =============================================================================
# Namespace, ConfigMap et Secrets pour FinPay
# =============================================================================

# --- Namespace dédié ---
apiVersion: v1
kind: Namespace
metadata:
  name: finpay
  labels:
    app.kubernetes.io/part-of: finpay

---
# --- ConfigMap : configuration commune à tous les services ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: finpay-common-config
  namespace: finpay
data:
  EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://discovery-server:8761/eureka/"
  SPRING_RABBITMQ_HOST: "rabbitmq"
  SPRING_RABBITMQ_PORT: "5672"
  SPRING_JPA_DATABASE_PLATFORM: "org.hibernate.dialect.PostgreSQLDialect"
  SPRING_JPA_HIBERNATE_DDL_AUTO: "update"
  SPRING_DATASOURCE_DRIVER_CLASS_NAME: "org.postgresql.Driver"
  RABBITMQ_EXCHANGE: "banking.events"

---
# --- Secrets : mots de passe de la base et RabbitMQ ---
apiVersion: v1
kind: Secret
metadata:
  name: finpay-db-secret
  namespace: finpay
type: Opaque
stringData:
  POSTGRES_USER: finpay
  POSTGRES_PASSWORD: finpay_secret
  SPRING_DATASOURCE_USERNAME: finpay
  SPRING_DATASOURCE_PASSWORD: finpay_secret

---
apiVersion: v1
kind: Secret
metadata:
  name: finpay-rabbitmq-secret
  namespace: finpay
type: Opaque
stringData:
  RABBITMQ_DEFAULT_USER: guest
  RABBITMQ_DEFAULT_PASS: guest
  RABBITMQ_USER: guest
  RABBITMQ_PASS: guest

---
apiVersion: v1
kind: Secret
metadata:
  name: finpay-jwt-secret
  namespace: finpay
type: Opaque
stringData:
  JWT_SECRET: "votre-cle-super-secrete-de-32-caracteres!"
