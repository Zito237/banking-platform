# =============================================================================
# Microservices Java Spring Boot (6 services métier)
# account-service et api-gateway ont replicas=2
# =============================================================================

# --- Auth Service (8081) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: finpay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: finpay/auth-service:latest
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: finpay-common-config
            - secretRef:
                name: finpay-db-secret
          env:
            - name: SPRING_CONFIG_IMPORT
              value: optional:configserver:http://config-server:8888
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/authdb
            - name: EUREKA_INSTANCE_HOSTNAME
              value: auth-service
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 40
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 80
            periodSeconds: 15
          resources:
            requests: { memory: "256Mi", cpu: "200m" }
            limits:   { memory: "512Mi", cpu: "500m" }
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: finpay
spec:
  selector:
    app: auth-service
  ports:
    - port: 8081

