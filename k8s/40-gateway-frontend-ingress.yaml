# =============================================================================
# API Gateway (replicas: 2), Frontend et Ingress
# =============================================================================

# --- API Gateway (8080) — replicas: 2 ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: finpay
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: finpay/api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: finpay-common-config
          env:
            - name: SPRING_CONFIG_IMPORT
              value: optional:configserver:http://config-server:8888
            - name: EUREKA_INSTANCE_HOSTNAME
              value: api-gateway
            - name: SPRING_CLOUD_GATEWAY_GLOBALCORS_CORS_CONFIGURATIONS_/**_ALLOWEDORIGINS
              value: "http://localhost,http://finpay.local"
          readinessProbe:
            httpGet: { path: /actuator/health, port: 8080 }
            initialDelaySeconds: 40
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /actuator/health, port: 8080 }
            initialDelaySeconds: 80
            periodSeconds: 15
          resources:
            requests: { memory: "256Mi", cpu: "200m" }
            limits:   { memory: "512Mi", cpu: "500m" }
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: finpay
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8080

---
# --- Frontend React (nginx, port 80) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: finpay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: finpay/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests: { memory: "64Mi", cpu: "50m" }
            limits:   { memory: "128Mi", cpu: "200m" }
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: finpay
spec:
  selector:
    app: frontend
  ports:
    - port: 80

---
# --- Ingress — Expose le frontend et l'API Gateway ---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: finpay-ingress
  namespace: finpay
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
    # Frontend accessible sur finpay.local
    - host: finpay.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
          # Les appels API sont routés vers la gateway
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8080

    # API Gateway accessible directement sur api.finpay.local
    - host: api.finpay.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8080
