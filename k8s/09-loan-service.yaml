apiVersion: apps/v1
kind: Deployment
metadata:
  name: loan-service
  namespace: finpay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loan-service
  template:
    metadata:
      labels:
        app: loan-service
    spec:
      containers:
        - name: loan-service
          image: finpay/loan-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8086
          env:
            - name: SPRING_CONFIG_IMPORT
              value: "optional:configserver:http://config-server:8888"
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://discovery-server:8761/eureka/"
            - name: EUREKA_INSTANCE_HOSTNAME
              value: "loan-service"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:h2:file:/data/loan/loandb;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1"
            - name: SPRING_DATASOURCE_USERNAME
              value: "lo"
            - name: SPRING_DATASOURCE_PASSWORD
              value: ""
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: "update"
            - name: SPRING_RABBITMQ_HOST
              value: "rabbitmq"
          volumeMounts:
            - name: loan-data
              mountPath: /data/loan
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8086
            initialDelaySeconds: 60
            periodSeconds: 10
      volumes:
        - name: loan-data
          persistentVolumeClaim:
            claimName: loan-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: loan-service
  namespace: finpay
spec:
  selector:
    app: loan-service
  ports:
    - port: 8086
      targetPort: 8086
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: loan-pvc
  namespace: finpay
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 500Mi
