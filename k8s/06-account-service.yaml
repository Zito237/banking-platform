apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-service
  namespace: finpay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: account-service
  template:
    metadata:
      labels:
        app: account-service
    spec:
      containers:
        - name: account-service
          image: finpay/account-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
          env:
            - name: SPRING_CONFIG_IMPORT
              value: "optional:configserver:http://config-server:8888"
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://discovery-server:8761/eureka/"
            - name: EUREKA_INSTANCE_HOSTNAME
              value: "account-service"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:h2:file:/data/account/accountdb;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1"
            - name: SPRING_DATASOURCE_USERNAME
              value: "ac"
            - name: SPRING_DATASOURCE_PASSWORD
              value: ""
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: "update"
            - name: SPRING_RABBITMQ_HOST
              value: "rabbitmq"
          volumeMounts:
            - name: account-data
              mountPath: /data/account
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 10
      volumes:
        - name: account-data
          persistentVolumeClaim:
            claimName: account-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: account-service
  namespace: finpay
spec:
  selector:
    app: account-service
  ports:
    - port: 8083
      targetPort: 8083
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: account-pvc
  namespace: finpay
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 500Mi
