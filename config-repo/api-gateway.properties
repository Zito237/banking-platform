# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  api-gateway.yml — Configuration de la passerelle API                       ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      # Routes vers les microservices (routage dynamique via Eureka)
      routes:
        # Auth Service
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**

        # Customer Service
        - id: customer-service
          uri: lb://customer-service
          predicates:
            - Path=/customers/**,/documents/**

        # Account Service
        - id: account-service
          uri: lb://account-service
          predicates:
            - Path=/accounts/**

        # Transaction Service
        - id: transaction-service
          uri: lb://transaction-service
          predicates:
            - Path=/transactions/**,/deposits/**,/withdrawals/**,/transfers/**

        # Loan Service
        - id: loan-service
          uri: lb://loan-service
          predicates:
            - Path=/loans/**

        # Operator Service
        - id: operator-service
          uri: lb://operator-service
          predicates:
            - Path=/operators/**

      # CORS pour le frontend React (port 5173)
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:5173"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true

# Clé secrète JWT (doit être identique à celle de auth-service)
jwt:
  secret: "votre-cle-super-secrete-de-32-caracteres!"
  expiration: 86400000  # 24 heures en millisecondes
