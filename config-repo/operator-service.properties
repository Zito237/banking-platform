# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  operator-service.yml — Configuration du service opérateurs                  ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

server:
  port: 8082

spring:
  application:
    name: operator-service
  datasource:
    url: jdbc:postgresql://localhost:5432/operatordb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
