# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  loan-service.yml — Configuration du service prêts                           ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

server:
  port: 8086

spring:
  application:
    name: loan-service
  datasource:
    url: jdbc:postgresql://localhost:5432/loandb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

# Configuration RabbitMQ
banking:
  events:
    exchange: banking.events
    routing:
      loanApproved: loan.approved
      loanRejected: loan.rejected
      documentProcessed: document.processed
