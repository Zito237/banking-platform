server.port=8085

spring.application.name=transaction-service

spring.datasource.url=jdbc:postgresql://localhost:5432/transactiondb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Resilience4j circuitbreaker
resilience4j.circuitbreaker.instances.accountService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.accountService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.accountService.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.accountService.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.accountService.failureRateThreshold=50

resilience4j.circuitbreaker.instances.operatorService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.operatorService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.operatorService.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.operatorService.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.operatorService.failureRateThreshold=50

# Resilience4j retry
resilience4j.retry.instances.accountService.maxAttempts=3
resilience4j.retry.instances.accountService.waitDuration=1s
resilience4j.retry.instances.accountService.retryExceptions[0]=java.io.IOException
resilience4j.retry.instances.accountService.retryExceptions[1]=java.util.concurrent.TimeoutException

# RabbitMQ events
banking.events.exchange=banking.events
banking.events.routing.transactionCompleted=transaction.completed
banking.events.routing.transactionFailed=transaction.failed

