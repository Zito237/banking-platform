# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  transaction-service.yml — Configuration du service transactions            ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

server:
  port: 8085

spring:
  application:
    name: transaction-service
  datasource:
    url: jdbc:postgresql://localhost:5432/transactiondb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

# Configuration Resilience4j (Circuit Breaker + Retry)
resilience4j:
  circuitbreaker:
    instances:
      accountService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
      operatorService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
  retry:
    instances:
      accountService:
        maxAttempts: 3
        waitDuration: 1s
        retryExceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException

# Configuration RabbitMQ pour la publication d'événements
banking:
  events:
    exchange: banking.events
    routing:
      transactionCompleted: transaction.completed
      transactionFailed: transaction.failed
