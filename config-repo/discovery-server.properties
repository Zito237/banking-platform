# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  discovery-server.yml — Configuration du serveur Eureka                      ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

server:
  port: 8761

spring:
  application:
    name: discovery-server

eureka:
  client:
    # Eureka ne s'enregistre pas lui-même et ne récupère pas le registre
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://localhost:8761/eureka/
  server:
    enable-self-preservation: false  # Désactivé en dev pour tests rapides
    eviction-interval-timer-in-ms: 5000
