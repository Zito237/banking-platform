# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  customer-service.yml — Configuration du service clients                     ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

server:
  port: 8084

spring:
  application:
    name: customer-service
  datasource:
    url: jdbc:postgresql://localhost:5432/customerdb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

# Configuration RabbitMQ spécifique
  rabbitmq:
    listener:
      simple:
        acknowledge-mode: auto
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000ms

# Exchange et routing keys pour les événements documentaires
banking:
  events:
    exchange: banking.events
    routing:
      documentSubmitted: document.submitted
      documentProcessed: document.processed
