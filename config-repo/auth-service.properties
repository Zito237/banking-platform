# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  auth-service.yml — Configuration du service d'authentification              ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://localhost:5432/authdb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

# Clé secrète JWT (doit être identique à celle de la Gateway)
jwt:
  secret: "votre-cle-super-secrete-de-32-caracteres!"
  expiration: 86400000  # 24 heures
