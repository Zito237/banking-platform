# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  account-service.yml — Configuration du service comptes                     ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

server:
  port: 8083

spring:
  application:
    name: account-service
  datasource:
    url: jdbc:postgresql://localhost:5432/accountdb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

# Configuration Resilience4j (Circuit Breaker)
resilience4j:
  circuitbreaker:
    instances:
      customerService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
