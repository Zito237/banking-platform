# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  application.yml — Configuration COMMUNE à tous les microservices            ║
# ║                                                                              ║
# ║  À quoi ça sert ?                                                            ║
# ║  Ce fichier est chargé par TOUS les services Java qui se connectent au      ║
# ║  Config Server. Il contient les propriétés partagées :                       ║
# ║  • Adresse d'Eureka (service discovery)                                      ║
# ║  • Configuration RabbitMQ (bus d'événements)                                  ║
# ║  • Paramètres communs de logging                                              ║
# ║                                                                              ║
# ║  Chaque service a aussi son propre fichier (ex: account-service.yml)          ║
# ║  qui surcharge les valeurs spécifiques.                                      ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

# ── Eureka (Service Discovery) ─────────────────────────────────────────────────
# Tous les services s'enregistrent auprès d'Eureka pour être découverts.
#
# NOTE: this file is a Spring .properties file (not YAML).
#
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

eureka.instance.prefer-ip-address=true
eureka.instance.lease-renewal-interval-in-seconds=30
eureka.instance.lease-expiration-duration-in-seconds=90

# ── RabbitMQ (Bus d'événements asynchrones) ──────────────────────────────────
# Utilisé pour la communication asynchrone entre microservices.
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.virtual-host=/

# Exchange topic pour les événements métier
spring.cloud.stream.bindings.default.content-type=application/json

# ── Actuator (Surveillance) ───────────────────────────────────────────────────
# Expose les endpoints de santé et de métriques pour Kubernetes et Prometheus.
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=${spring.application.name}

# ── Logging ────────────────────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.bank=DEBUG
logging.pattern.console="%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

