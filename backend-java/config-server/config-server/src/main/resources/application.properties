spring.application.name=config-server
server.port=8888
# Git-backed config source (default)
spring.cloud.config.server.git.uri=https://github.com/BankingProjectM1prof/cloud-conf

spring.cloud.config.server.git.uri=https://github.com/Zito237/banking-platform.git
spring.cloud.config.server.git.default-label=main
spring.cloud.config.server.git.search-paths=config-repo

# Fallback note: local native backend is available in application-local.properties.
# Start the server with `--spring.profiles.active=local` to enable it.





# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Logging
logging.level.org.springframework.cloud.config=DEBUG



