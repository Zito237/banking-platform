# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  application.properties — Configuration MINIMALE de l'auth-service             ║
# ║                                                                              ║
# ║  Ce fichier est en format .properties (et non .yml) comme demande.           ║
# ║  Il est MINIMAL car la vraie configuration vient du Config Server.           ║
# ║                                                                              ║
# ║  Il contient SEULEMENT :                                                     ║
# ║  • Le nom de l'application (pour s'enregistrer dans Eureka)                  ║
# ║  • L'adresse du Config Server (pour aller chercher auth-service.yml)         ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

# Nom de l'application (doit correspondre au fichier dans config-repo/)
spring.application.name=operator-service

# Adresse du Config Server (doit etre demarre avant)
spring.config.import=optional:configserver:http://localhost:8888
spring.cloud.config.fail-fast=true
spring.cloud.config.retry.initial-interval=1000
spring.cloud.config.retry.max-attempts=6
spring.cloud.config.retry.max-interval=2000
spring.cloud.config.retry.multiplier=1.1

# Force Eureka à s'enregistrer avec localhost (pas le hostname machine)
eureka.instance.hostname=localhost
eureka.instance.ip-address=127.0.0.1
eureka.instance.prefer-ip-address=true
