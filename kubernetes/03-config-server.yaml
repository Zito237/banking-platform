apiVersion: v1
kind: ConfigMap
metadata:
  name: config-repo
  namespace: finpay
data:
  # Les fichiers de config sont montés depuis le ConfigMap
  # En production, utiliser un Git backend ou un volume externe
  application.properties: |
    eureka.client.service-url.defaultZone=http://discovery-server:8761/eureka/
    eureka.client.register-with-eureka=true
    eureka.client.fetch-registry=true
    eureka.instance.prefer-ip-address=true
    spring.rabbitmq.host=rabbitmq
    spring.rabbitmq.port=5672
    spring.rabbitmq.username=guest
    spring.rabbitmq.password=guest
    management.endpoints.web.exposure.include=health,info,metrics
    management.endpoint.health.show-details=always
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-server
  namespace: finpay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-server
  template:
    metadata:
      labels:
        app: config-server
    spec:
      containers:
        - name: config-server
          image: finpay/config-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8888
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "native"
            - name: SPRING_CLOUD_CONFIG_SERVER_NATIVE_SEARCH_LOCATIONS
              value: "file:///config-repo"
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://discovery-server:8761/eureka/"
          volumeMounts:
            - name: config-repo-volume
              mountPath: /config-repo
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8888
            initialDelaySeconds: 40
            periodSeconds: 10
      volumes:
        - name: config-repo-volume
          configMap:
            name: config-repo
---
apiVersion: v1
kind: Service
metadata:
  name: config-server
  namespace: finpay
spec:
  selector:
    app: config-server
  ports:
    - port: 8888
      targetPort: 8888
  type: ClusterIP
