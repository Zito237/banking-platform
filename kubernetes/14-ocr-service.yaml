apiVersion: apps/v1
kind: Deployment
metadata:
  name: ocr-service
  namespace: finpay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ocr-service
  template:
    metadata:
      labels:
        app: ocr-service
    spec:
      containers:
        - name: ocr-service
          image: finpay/ocr-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9001
          env:
            - name: RABBITMQ_HOST
              value: "rabbitmq"
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_USER
              value: "guest"
            - name: RABBITMQ_PASS
              value: "guest"
            - name: TESSERACT_CMD
              value: "/usr/bin/tesseract"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: ocr-service
  namespace: finpay
spec:
  selector:
    app: ocr-service
  ports:
    - port: 9001
      targetPort: 9001
  type: ClusterIP
